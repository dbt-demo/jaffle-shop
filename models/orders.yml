version: 2
models:
  - name: orders
    description: "This model aggregates order data and payment information."
    columns:
      - name: order_id
        description: "The unique identifier for each order."
      - name: customer_id
        description: "The unique identifier for each customer."
      - name: order_date
        description: "The date when the order was placed."
      - name: status
        description: "The current status of the order."
      - name: credit_card_amount
        description: "The total amount paid using credit card."
      - name: coupon_amount
        description: "The total amount paid using coupons."
      - name: bank_transfer_amount
        description: "The total amount paid using bank transfer."
      - name: gift_card_amount
        description: "The total amount paid using gift cards."
      - name: amount
        description: "The total amount paid for the order."

