models:
  - name: customers
    description: Aggregates customer data including first order date, most recent order date, number of orders, and total payment amount.
    columns:
      - name: customer_id
        description: Unique identifier for each customer.
      - name: first_name
        description: First name of the customer.
      - name: last_name
        description: Last name of the customer.
      - name: first_order
        description: Date of the first order placed by the customer.
      - name: most_recent_order
        description: Date of the most recent order placed by the customer.
      - name: number_of_orders
        description: Total number of orders placed by the customer.
      - name: customer_lifetime_value
        description: Total amount spent by the customer.
