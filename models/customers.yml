models:
  - name: customers
    description: This model aggregates customer data from various staging models, providing key metrics such as first order date, most recent order date, number of orders, and total payment amount for each customer.
    columns:
      - name: customer_id
        description: The unique identifier for each customer.
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order
        description: The date of the customer's first order.
      - name: most_recent_order
        description: The date of the customer's most recent order.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_lifetime_value
        description: The total amount spent by the customer.
