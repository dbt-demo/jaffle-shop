version: 2
models:
  - name: customers
    description: Customer data with orders and payments information.
    columns:
      - name: customer_id
        description: The unique identifier for each customer.
        tests:
          - not_null
          - unique
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: first_order
        description: The date of the first order placed by the customer.
      - name: most_recent_order
        description: The date of the most recent order placed by the customer.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_lifetime_value
        description: The total amount spent by the customer.

